version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: emailsystem-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emailsystem-dev-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: emailsystem-backend-dev
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
    volumes:
      - ./src:/app/src
      - ./public/uploads:/app/public/uploads
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - emailsystem-dev-network
    restart: unless-stopped

volumes:
  redis_dev_data:
    driver: local

networks:
  emailsystem-dev-network:
    driver: bridge
