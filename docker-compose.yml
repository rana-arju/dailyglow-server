services:
  redis:
    image: redis:7-alpine
    container_name: emailsystem-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ['CMD', 'sh', '-c', 'redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emailsystem-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: emailsystem-backend
    ports:
      - '${PORT:-5000}:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - emailsystem-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://206.162.244.131:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  redis_data:
    driver: local

networks:
  emailsystem-network:
    driver: bridge
